<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hanns EV Garage - Katalog</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap");

      :root {
        --bg-main: #0f172a;
        --bg-card: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --accent: #0ea5e9;
        --accent-hover: #0284c7;
      }

      /* Flexbox buat dorong footer ke bawah kalau konten dikit */
      body {
        font-family: "Inter", sans-serif;
        margin: 0;
        background-color: var(--bg-main);
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .main-content {
        flex: 1; /* Konten utama mengambil sisa space biar footer tetap di bawah */
        padding-bottom: 50px;
      }

      /* HEADER DENGAN LOGO */
      header {
        background: rgba(30, 41, 59, 0.8);
        backdrop-filter: blur(10px);
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .header-logo {
        width: 60px; /* Atur ukuran logo di sini */
        height: auto;
        margin-bottom: 10px;
        border-radius: 8px; /* Opsional: kalau logo mau agak membulat */
      }

      .header-text h1 {
        margin: 0;
        font-weight: 800;
        font-size: 1.8em;
        letter-spacing: -0.5px;
        text-align: center;
      }
      .header-text p {
        margin: 5px 0 0;
        color: var(--accent);
        font-weight: 600;
        text-align: center;
        font-size: 0.9em;
      }

      /* FOOTER */
      footer {
        background: #0b1120;
        padding: 25px 20px;
        text-align: center;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        margin-top: auto; /* Memastikan dia selalu di bawah */
      }
      footer p {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.85em;
      }
      footer .footer-brand {
        color: var(--accent);
        font-weight: 600;
      }

      /* (Sisa CSS nav-tabs, grid, card, modal sama persis seperti sebelumnya) */
      .nav-tabs {
        display: flex;
        justify-content: center;
        gap: 15px;
        padding: 30px 20px 20px;
      }
      .nav-tabs button {
        background: var(--bg-card);
        color: var(--text-main);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 12px 24px;
        cursor: pointer;
        border-radius: 50px;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.3s ease;
      }
      .nav-tabs button:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .nav-tabs button.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
        box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 25px;
        padding: 0 20px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .card {
        background: var(--bg-card);
        border-radius: 16px;
        overflow: hidden;
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
        border-color: rgba(255, 255, 255, 0.15);
      }
      .card-img-wrapper {
        width: 100%;
        padding-top: 75%;
        position: relative;
        background: #000;
      }
      .card img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .card-content {
        padding: 20px;
      }
      .card h3 {
        margin: 0 0 10px;
        font-size: 1.2em;
        font-weight: 600;
      }
      .card p.harga {
        color: var(--accent);
        font-weight: 800;
        font-size: 1.1em;
        margin: 0;
      }

      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(5px);
        z-index: 100;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .modal-overlay.active {
        display: flex;
        opacity: 1;
      }
      .modal-content {
        background: var(--bg-main);
        width: 90%;
        max-width: 900px;
        border-radius: 20px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        position: relative;
        max-height: 90vh;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .modal-body {
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }
      @media (min-width: 768px) {
        .modal-body {
          flex-direction: row;
          overflow: hidden;
        }
        .modal-gallery {
          width: 55%;
          overflow-y: auto;
          padding: 20px;
          background: #000;
        }
        .modal-info {
          width: 45%;
          padding: 30px;
          overflow-y: auto;
        }
      }
      .main-img-container {
        width: 100%;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 15px;
      }
      .main-img-container img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: cover;
        aspect-ratio: 4/3;
      }
      .thumbnails {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 10px;
      }
      .thumbnails img {
        width: 80px;
        height: 60px;
        object-fit: cover;
        border-radius: 8px;
        cursor: pointer;
        opacity: 0.6;
        transition: 0.2s;
        border: 2px solid transparent;
      }
      .thumbnails img:hover,
      .thumbnails img.active {
        opacity: 1;
        border-color: var(--accent);
      }
      .close-btn {
        position: absolute;
        top: 15px;
        right: 20px;
        background: rgba(0, 0, 0, 0.5);
        border: none;
        color: white;
        width: 35px;
        height: 35px;
        border-radius: 50%;
        font-size: 1.2em;
        cursor: pointer;
        z-index: 10;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .close-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .modal-info h2 {
        margin: 0 0 10px;
        font-size: 1.8em;
      }
      .modal-info .harga-detail {
        color: var(--accent);
        font-size: 1.5em;
        font-weight: 800;
        margin: 0 0 20px;
      }
      .modal-info h4 {
        margin: 20px 0 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.9em;
      }
      .modal-info p {
        line-height: 1.6;
        color: var(--text-main);
        margin-bottom: 20px;
        white-space: pre-wrap;
      }
      .btn-whatsapp {
        display: block;
        width: 100%;
        background: #25d366;
        color: white;
        text-align: center;
        padding: 15px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: bold;
        font-size: 1.1em;
        transition: background 0.3s;
      }
      .btn-whatsapp:hover {
        background: #1ebe5d;
      }
    </style>
  </head>
  <body>
    <script src="data.js"></script>

    <header>
      <img src="images/logo.svg" alt="Logo" class="header-logo" />
      <div class="header-text">
        <h1>Hanns EV Garage</h1>
        <p>Spesialis Motor Listrik & Custom Battery</p>
      </div>
    </header>

    <div class="main-content">
      <div class="nav-tabs">
        <button id="btn-motor" class="active" onclick="renderKatalog('motor')">Motor Listrik</button>
        <button id="btn-sparepart" onclick="renderKatalog('sparepart')">Sparepart</button>
      </div>

      <div class="grid" id="katalog-container"></div>
    </div>

    <footer>
      <p>&copy; 2026 <span class="footer-brand">Hanns EV Garage</span>. All Rights Reserved.</p>
    </footer>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
      <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="closeModal(event)">✕</button>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <script>
      function renderKatalog(filterTipe) {
        document.getElementById("btn-motor").classList.toggle("active", filterTipe === "motor");
        document.getElementById("btn-sparepart").classList.toggle("active", filterTipe === "sparepart");

        const container = document.getElementById("katalog-container");
        container.innerHTML = "";

        // database sekarang diambil dari data.js
        const dataFilter = database.filter((item) => item.tipe === filterTipe);

        dataFilter.forEach((item) => {
          const coverImg = item.images && item.images.length > 0 ? item.images[0] : "https://via.placeholder.com/800x600/1e293b/fff?text=No+Image";
          const card = `
                <div class="card" onclick="openModal(${item.id})">
                    <div class="card-img-wrapper">
                        <img src="${coverImg}" alt="${item.nama}">
                    </div>
                    <div class="card-content">
                        <h3>${item.nama}</h3>
                        <p class="harga">${item.harga}</p>
                    </div>
                </div>
            `;
          container.innerHTML += card;
        });
      }

      function openModal(id) {
        const item = database.find((x) => x.id === id);
        if (!item) return;

        let thumbnailsHtml = "";
        const mainImg = item.images && item.images.length > 0 ? item.images[0] : "https://via.placeholder.com/800x600/1e293b/fff?text=No+Image";

        if (item.images && item.images.length > 0) {
          item.images.forEach((img, index) => {
            const activeClass = index === 0 ? "active" : "";
            thumbnailsHtml += `<img src="${img}" class="${activeClass}" onclick="changeMainImage(this, '${img}')" alt="thumb">`;
          });
        }

        const modalBody = document.getElementById("modalBody");
        modalBody.innerHTML = `
            <div class="modal-gallery">
                <div class="main-img-container">
                    <img id="mainImageDisplay" src="${mainImg}" alt="${item.nama}">
                </div>
                <div class="thumbnails">
                    ${thumbnailsHtml}
                </div>
            </div>
            <div class="modal-info">
                <h2>${item.nama}</h2>
                <div class="harga-detail">${item.harga}</div>
                <h4>Deskripsi Produk</h4>
                <p>${item.deskripsi}</p>
                <a href="https://wa.me/6281234567890?text=Halo%20Hanns%20EV%20Garage,%20saya%20mau%20tanya%20tentang%20${encodeURIComponent(item.nama)}" target="_blank" class="btn-whatsapp">
                    Tanya via WhatsApp
                </a>
            </div>
        `;

        const modal = document.getElementById("modalOverlay");
        modal.style.display = "flex";
        setTimeout(() => modal.classList.add("active"), 10);
        document.body.style.overflow = "hidden";
      }

      function changeMainImage(element, src) {
        document.getElementById("mainImageDisplay").src = src;
        const thumbs = document.querySelectorAll(".thumbnails img");
        thumbs.forEach((t) => t.classList.remove("active"));
        element.classList.add("active");
      }

      function closeModal(event) {
        if (event && event.target.closest(".modal-content") && !event.target.classList.contains("close-btn")) {
          return;
        }
        const modal = document.getElementById("modalOverlay");
        modal.classList.remove("active");
        setTimeout(() => {
          modal.style.display = "none";
        }, 300);
        document.body.style.overflow = "auto";
      }

      // Load awal
      renderKatalog("motor");
    </script>
  </body>
</html>
